server:
  port: 8080

spring:
  application:
    name: signaldesk
  profiles:
    active: dev
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3307}/${MYSQL_DATABASE:signaldesk}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=utf8
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

# Elasticsearch
signaldesk:
  elasticsearch:
    uris: http://localhost:9200
    index-prefix: signaldesk

# JWT
jwt:
  secret: ${JWT_SECRET:c2lnbmFsZGVzay1kZXYtc2VjcmV0LWtleS1mb3Itand0LXRva2VuLWdlbmVyYXRpb24tMjAyNA}
  access-token-expiration: 86400000    # 24 hours
  refresh-token-expiration: 604800000  # 7 days

# AI Provider
ai:
  openai:
    api-key: ${OPENAI_API_KEY:}
    base-url: https://api.openai.com/v1
    model: gpt-3.5-turbo
    timeout-seconds: 60

# Logging
logging:
  level:
    com.signaldesk: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
